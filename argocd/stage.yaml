apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ciyex-portal-ui-stage
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/qiaben/ciyex-portal-ui.git
    targetRevision: main
    path: k8s/overlays/stage
  destination:
    server: https://kubernetes.default.svc
    namespace: ciyex-stage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ciyex-portal-ui-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/qiaben/ciyex-portal-ui.git
    targetRevision: main
    path: k8s/overlays/dev
  destination:
    server: https://10.0.0.50:6443
    namespace: ciyex-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
